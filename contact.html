<!DOCTYPE html>
<html lang="en">
<head>
    <script>
      !function(n,o){o.forEach(function(o){n[o]||(n[o]=function(){(n[o].q=n[o].q||[]).push(arguments)})})}(window,["alloy"]);
      alloy("configure", {
        "datastreamId": "REPLACE_WITH_YOUR_DATASTREAM_ID",
        "orgId": "REPLACE_WITH_YOUR_ORG_ID@AdobeOrg"
      });
    </script>

    <meta charset="UTF-8">
    <title>Checkout | Velox Tech</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f5f5f7; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .form-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; background: #0071e3; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

    <div class="form-card">
        <h2>Complete Purchase</h2>
        <form id="purchase-form">
            <input type="text" id="cust_name" placeholder="Full Name" required>
            <input type="email" id="cust_email" placeholder="Email Address" required>
            <select id="product_type">
                <option value="buds_pro" data-price="199">Velox Buds Pro - $199</option>
                <option value="watch_5" data-price="399">Velox Watch 5 - $399</option>
            </select>
            <button type="submit">Order Now</button>
        </form>
        <div id="success-msg" style="display:none; text-align:center; color: #06c;">
            <h3>Thank you for your order!</h3>
            <p>We've sent a confirmation email.</p>
        </div>
    </div>

    <script>
    document.getElementById('purchase-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        this.style.display = 'none';
        document.getElementById('success-msg').style.display = 'block';

        const selectedOption = document.getElementById('product_type').selectedOptions[0];
        const price = selectedOption.getAttribute('data-price');

        // Retaining your custom tracking trigger format, which Adobe Tags can monitor!
        window.adobeDataLayer = window.adobeDataLayer || [];
        window.adobeDataLayer.push({
            'event': 'purchase_complete',
            'transaction_value': Number(price), 
            'product_name': selectedOption.value,
            'customer_email': document.getElementById('cust_email').value
        });
    });
</script>
</body>
</html>
